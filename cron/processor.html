<!DOCTYPE html>
<html>
<head>
    <title>Batch Processor</title>
    <style>
        body {
            background: #0a0e27;
            color: #64ffda;
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }
        pre {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 200px;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
        }
        .status {
            color: #8892b0;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
        .warning { color: #f59e0b; }
    </style>
</head>
<body>
    <h2>🔄 Batch Processor</h2>
    <pre id="output">⏳ Starting...</pre>
    <div class="status">Last run: <span id="timestamp">-</span></div>
    
    <script>
        // ============================================
        // BATCH PROCESSOR - Runs via cron-job.de
        // ============================================
        
        function processBatches() {
            const output = document.getElementById('output');
            const timestamp = document.getElementById('timestamp');
            const startTime = new Date();
            timestamp.textContent = startTime.toLocaleString();
            
            output.textContent = '⏳ Checking for pending batches...\n';
            
            try {
                const batches = JSON.parse(localStorage.getItem('batches') || '[]');
                const now = new Date();
                
                const pending = batches.filter(b => 
                    b.status === 'pending' && 
                    new Date(b.scheduled_at) <= now
                );
                
                if (pending.length === 0) {
                    output.innerHTML = '✅ No pending batches to process\n\n📊 <span class="info">Total batches:</span> ' + batches.length + '\n📊 <span class="success">Completed:</span> ' + batches.filter(b => b.status === 'completed').length;
                    return;
                }
                
                output.textContent = `📦 Found ${pending.length} pending batches\n\n`;
                let processed = 0;
                let failed = 0;
                
                const toProcess = pending.slice(0, 10);
                
                toProcess.forEach((batch, index) => {
                    try {
                        batch.status = 'completed';
                        batch.processed_at = now.toISOString();
                        processed++;
                        output.innerHTML += `✅ [${index + 1}/${toProcess.length}] Processed ${batch.quantity} items (${batch.id.substring(0, 8)})\n`;
                    } catch (error) {
                        batch.status = 'failed';
                        batch.api_response = error.message;
                        failed++;
                        output.innerHTML += `❌ [${index + 1}/${toProcess.length}] Failed: ${batch.id.substring(0, 8)} - ${error.message}\n`;
                    }
                });
                
                localStorage.setItem('batches', JSON.stringify(batches));
                updateOrderStatuses();
                
                output.innerHTML += `\n✅ <span class="success">Processed: ${processed}</span> | ❌ <span class="error">Failed: ${failed}</span>`;
                output.innerHTML += `\n⏱️ Time: ${new Date().toLocaleTimeString()}`;
                
            } catch (error) {
                output.innerHTML = `❌ <span class="error">Error:</span> ${error.message}\n\n${error.stack}`;
            }
        }
        
        function updateOrderStatuses() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const batches = JSON.parse(localStorage.getItem('batches') || '[]');
            
            orders.forEach(order => {
                const orderBatches = batches.filter(b => b.order_id === order.id);
                if (orderBatches.length === 0) return;
                
                const allCompleted = orderBatches.every(b => b.status === 'completed');
                const anyFailed = orderBatches.some(b => b.status === 'failed');
                
                if (allCompleted) {
                    order.status = 'completed';
                } else if (anyFailed) {
                    order.status = 'failed';
                } else {
                    order.status = 'processing';
                }
            });
            
            localStorage.setItem('orders', JSON.stringify(orders));
        }
        
        document.addEventListener('DOMContentLoaded', processBatches);
        setTimeout(processBatches, 100);
    </script>
</body>
</html>
